[pytest]
# TothBot V2 — pytest configuration
# Test specs: 1021001 Unit_Test_Specification dv1_0
#             1021002 Integration_Test_Specification dv1_0
# BP standard: 1011001 Engineering_Best_Practices dv1_7

testpaths = tests
asyncio_mode = auto

# UT-FW-004: Do NOT use uvloop in tests
# Standard asyncio only — uvloop only in production (SS-PRE-005)

# Failure output: always show full diff
addopts =
    -v
    --tb=short
    --strict-markers

markers =
    unit:        Unit tests — single module in isolation
    integration: Integration tests — cross-module pipeline scenarios
